<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário EJA</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery (necessário para Select2) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>
        .select2-container .select2-selection--multiple {
            min-height: 38px;
            padding: 4px;
        }
        .mes-bloqueado {
            background: #eee !important;
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-4 mb-5">
    <h2 class="mb-4">Formulário de Acompanhamento</h2>

    <form action="/salvar" method="POST">

        <!-- ================= ESTADO ================= -->
        <div class="card shadow p-3 mb-4">
            <h5>Informações Gerais</h5>

            <div class="row mt-3">
                <div class="col-md-6">
                    <label class="form-label">Estado</label>

                    {% if is_gestor %}
                        <select id="estado" name="estado" class="form-select" required>
                            <option value="">Selecione</option>
                            {% for e in estados %}
                                <option value="{{ e.sigla }}">{{ e.sigla }} - {{ e.nome }}</option>
                            {% endfor %}
                        </select>
                    {% else %}
                        <input type="text" class="form-control" value="{{ estado_fixo }}" readonly>
                        <input type="hidden" name="estado" value="{{ estado_fixo }}">
                    {% endif %}
                </div>

                <div class="col-md-6">
                    <label class="form-label">Município(s)</label>

                    <select id="municipios" name="municipios" class="form-select" multiple required>
                        <option value="">Selecione o estado primeiro</option>
                    </select>

                    <small class="text-muted">Você pode selecionar vários municípios.</small>
                </div>
            </div>
        </div>

        <!-- ÁREA DINÂMICA DOS MUNICÍPIOS -->
        <div id="areaMunicipios"></div>

        <button class="btn btn-primary mt-3">Enviar</button>
    </form>
</div>

<!-- ================= JAVASCRIPT ================= -->
<script>
    // Ativar Select2
    $(document).ready(function() {
        $('#municipios').select2({
            placeholder: "Selecione os municípios",
            width: '100%'
        });
    });

    // Carregar municípios ao selecionar estado
    document.getElementById("estado")?.addEventListener("change", function () {
        const uf = this.value;
        const select = document.getElementById("municipios");

        select.innerHTML = "<option>Carregando...</option>";
        $('#municipios').trigger('change');

        fetch("/municipios/" + uf)
            .then(r => r.json())
            .then(lista => {
                select.innerHTML = "";

                lista.forEach(m => {
                    const opt = new Option(m.nome, m.id, false, false);
                    select.add(opt);
                });

                $('#municipios').trigger('change');
            });
    });

    // Criar campos dinâmicos para cada município selecionado
    $('#municipios').on('change', function () {
        const selecionados = $(this).select2('data');
        const area = document.getElementById("areaMunicipios");

        area.innerHTML = "";

        selecionados.forEach(item => {
            const id = item.id;
            const nome = item.text;

            // Gerar meses até o mês atual
            const meses = ["jan","fev","mar","abr","mai","jun","jul","ago","setm"];
            const mesAtual = new Date().getMonth(); // 0 = jan

            const camposMeses = meses.slice(0, mesAtual + 1).map(m => `
                <div class="col-4 col-md-2 mb-2">
                    <label class="form-label text-capitalize">${m}</label>
                    <input type="number" name="${m}_${id}" class="form-control campo-mes" min="0">
                </div>
            `).join("");

            area.innerHTML += `
                <div class="card shadow p-3 mb-4">
                    <h5>${nome}</h5>

                    <input type="hidden" name="nome_${id}" value="${nome}">

                    <!-- FORMADOR LOCAL -->
                    <div class="row mt-3">
                        <div class="col-md-6">
                            <label class="form-label">Formador Local</label>
                            <select name="formador_local_${id}" class="form-select">
                                <option value="">Selecione</option>
                                <option value="Sim">Sim</option>
                                <option value="Não">Não</option>
                                <option value="Não identificado">Não identificado</option>
                            </select>
                        </div>
                    </div>

                    <hr>

                    <!-- PBA -->
                    <div class="row mt-3">
                        <div class="col-md-6">
                            <label class="form-label">Há turmas de PBA?</label>
                            <select name="pba_${id}" class="form-select pba-select" data-id="${id}">
                                <option value="">Selecione</option>
                                <option value="Sim">Sim</option>
                                <option value="Não">Não</option>
                                <option value="Não sei">Não sei</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Quantas turmas?</label>
                            <input type="number" name="pba_qtd_${id}" class="form-control pba-qtd" min="0" value="0" readonly>
                        </div>
                    </div>

                    <!-- ALFABETIZAÇÃO EJA -->
                    <div class="row mt-3">
                        <div class="col-md-6">
                            <label class="form-label">Há turmas de Alfabetização EJA?</label>
                            <select name="eja_alf_${id}" class="form-select eja-alf-select" data-id="${id}">
                                <option value="">Selecione</option>
                                <option value="Sim">Sim</option>
                                <option value="Não">Não</option>
                                <option value="Não sei">Não sei</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Quantas turmas?</label>
                            <input type="number" name="eja_alf_qtd_${id}" class="form-control eja-alf-qtd" min="0" value="0" readonly>
                        </div>
                    </div>

                    <!-- EJA ANOS INICIAIS -->
                    <div class="row mt-3">
                        <div class="col-md-6">
                            <label class="form-label">Há turmas de EJA - Anos Iniciais?</label>
                            <select name="eja_ai_${id}" class="form-select eja-ai-select" data-id="${id}">
                                <option value="">Selecione</option>
                                <option value="Sim">Sim</option>
                                <option value="Não">Não</option>
                                <option value="Não sei">Não sei</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Quantas turmas?</label>
                            <input type="number" name="eja_ai_qtd_${id}" class="form-control eja-ai-qtd" min="0" value="0" readonly>
                        </div>
                    </div>

                    <hr>

                    <h6>Número Total de Participantes em Formações Presenciais</h6>

                    <div class="row mt-2">
                        ${camposMeses}
                    </div>
                </div>
            `;

            carregarDadosAnteriores(id);
        });

        ativarLogicaCondicional();
    });

    // Função que ativa a lógica dos campos condicionais
    function ativarLogicaCondicional() {

        $(".pba-select").on("change", function () {
            const id = $(this).data("id");
            const qtd = $(`input[name='pba_qtd_${id}']`);

            if ($(this).val() === "Sim") qtd.prop("readonly", false);
            else qtd.val(0).prop("readonly", true);
        });

        $(".eja-alf-select").on("change", function () {
            const id = $(this).data("id");
            const qtd = $(`input[name='eja_alf_qtd_${id}']`);

            if ($(this).val() === "Sim") qtd.prop("readonly", false);
            else qtd.val(0).prop("readonly", true);
        });

        $(".eja-ai-select").on("change", function () {
            const id = $(this).data("id");
            const qtd = $(`input[name='eja_ai_qtd_${id}']`);

            if ($(this).val() === "Sim") qtd.prop("readonly", false);
            else qtd.val(0).prop("readonly", true);
        });
    }

    // Preencher automaticamente dados anteriores
    function carregarDadosAnteriores(id) {
        fetch("/api/dados_municipio/" + id)
            .then(r => r.json())
            .then(d => {
                if (!d.existe) return;

                // Formador local
                $(`select[name='formador_local_${id}']`).val(d.formador_local);

                // PBA
                $(`select[name='pba_${id}']`).val(d.pba).trigger("change");
                $(`input[name='pba_qtd_${id}']`).val(d.pba_qtd);

                // Alfabetização EJA
                $(`select[name='eja_alf_${id}']`).val(d.eja_alf).trigger("change");
                $(`input[name='eja_alf_qtd_${id}']`).val(d.eja_alf_qtd);

                // EJA Anos Iniciais
                $(`select[name='eja_ai_${id}']`).val(d.eja_ai).trigger("change");
                $(`input[name='eja_ai_qtd_${id}']`).val(d.eja_ai_qtd);

                // Meses
                const ordem = ["jan","fev","mar","abr","mai","jun","jul","ago","setm"];

                Object.entries(d.meses).forEach(([mes, valor]) => {
                    const campo = $(`input[name='${mes}_${id}']`);
                    campo.val(valor);

                    const indiceMes = ordem.indexOf(mes);

                    // Travar meses anteriores ao mês atual
                    if (indiceMes + 1 < d.mes_atual) {
                        campo.prop("readonly", true).addClass("mes-bloqueado");
                    }
                });
            });
    }
</script>

</body>
</html>

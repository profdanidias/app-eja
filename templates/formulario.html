<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário EJA</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

<style>
body { background:#f5f5f5; }

.container-box {
    background:white;
    padding:25px;
    border-radius:10px;
    margin-top:30px;
    box-shadow:0 0 10px #00000020;
}

.municipio-card {
    background:#fff;
    border-left:5px solid #0d6efd;
    padding:20px;
    margin-bottom:20px;
    border-radius:8px;
    position:relative;
}

.municipio-titulo {
    font-size:20px;
    font-weight:bold;
    color:#0d6efd;
    margin-bottom:15px;
}

.btn-remover {
    position:absolute;
    top:15px;
    right:15px;
}

.erro {
    border:2px solid red !important;
}

.linha {
    display:flex;
    gap:10px;
    align-items:center;
}
</style>
</head>

<body>

<div class="container">
<div class="container-box">

<h3 class="mb-4">Formulário EJA</h3>

<div class="alert alert-warning">
O preenchimento atual substitui o anterior. Sempre valerá o último envio.
</div>

<form action="/salvar" method="POST" onsubmit="return validarFormulario()">

<input type="hidden" name="usuario_id" value="{{ usuario_id }}">

<!-- ESTADO -->
<div class="mb-3">
<label>Estado</label>
<select id="estado" name="estado" class="form-select" required>
<option value="">ESCOLHA O SEU ESTADO</option>
{% for estado in estados %}
<option value="{{ estado.sigla }}">{{ estado.nome }}</option>
{% endfor %}
</select>
</div>

<!-- MUNICÍPIOS -->
<div class="mb-3">
<label>Municípios</label>
<select id="municipios" name="municipios" class="form-select" multiple required></select>
</div>

<hr>

<div id="area-municipios"></div>

<button type="submit" class="btn btn-primary">Enviar</button>
<button type="button" onclick="limparTudo()" class="btn btn-secondary">LIMPAR</button>

</form>

<br>

<button onclick="abrirAdmin()" class="btn btn-dark">Painel Admin</button>

</div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>

// SELECT2
$(function(){
    $('#estado').select2({ width:'100%' });
    $('#municipios').select2({ width:'100%' });
});

// ADMIN
function abrirAdmin(){
    let senha = prompt("Digite a senha:");
    if(senha === "PactoBrasilPelaEJA"){
        window.location.href="/dashboard";
    } else alert("Senha incorreta");
}

// CARREGAR MUNICÍPIOS
$('#estado').on('change', function(){
    let estado = $(this).val();
    $.get('/municipios/'+estado, function(data){
        $('#municipios').empty();
        data.forEach(m=>{
            $('#municipios').append(`<option value="${m.id}" data-nome="${m.nome}">${m.nome}</option>`);
        });
    });
});

// MESES DINÂMICOS
function gerarMeses(id){
    const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    const atual = new Date().getMonth();
    let html = '';

    meses.forEach((m,i)=>{
        if(i <= atual){
            html += `
            <div class="col-md-3 mb-2">
            <label>${m.toUpperCase()}</label>
            <input type="number" min="0" name="${m}_${id}" class="form-control numero" value="0">
            </div>`;
        }
    });

    return html;
}

// CRIAR CARDS
$('#municipios').on('change', function(){

    let area = $('#area-municipios');
    area.empty();

    $(this).find(':selected').each(function(){

        let id = $(this).val();
        let nome = $(this).data('nome');

        area.append(`
        <div class="municipio-card" id="card-${id}">

        <button type="button" class="btn btn-danger btn-sm btn-remover" data-id="${id}">LIMPAR</button>

        <div class="municipio-titulo">${nome}</div>

        <div class="mb-2">
        <label>Há Formador Local?</label>
        <select name="formador_local_${id}" class="form-select obrigatorio">
        <option value="">Selecione...</option>
        <option value="Sim">Sim</option>
        <option value="Não">Não</option>
        <option value="Não Identificado">Não Identificado</option>
        </select>
        </div>

        <div class="linha">
        <label>Há turmas de PBA?</label>
        <select class="form-select pba obrigatorio" data-id="${id}">
        <option value="">Selecione...</option>
        <option value="Sim">Sim</option>
        <option value="Não">Não</option>
        <option value="Não sei">Não sei</option>
        </select>

        <input type="number" min="0" id="pba_qtd_${id}" class="form-control numero" placeholder="Quantidade de turmas" value="0" disabled>
        </div>

        <div class="linha mt-2">
        <label>Há turmas de Alfabetização EJA?</label>
        <select class="form-select eja_alf obrigatorio" data-id="${id}">
        <option value="">Selecione...</option>
        <option value="Sim">Sim</option>
        <option value="Não">Não</option>
        <option value="Não sei">Não sei</option>
        </select>

        <input type="number" min="0" id="eja_alf_qtd_${id}" class="form-control numero" placeholder="Quantidade de turmas" value="0" disabled>
        </div>

        <div class="linha mt-2">
        <label>Há turmas de EJA - Anos Iniciais?</label>
        <select class="form-select eja_ai obrigatorio" data-id="${id}">
        <option value="">Selecione...</option>
        <option value="Sim">Sim</option>
        <option value="Não">Não</option>
        <option value="Não sei">Não sei</option>
        </select>

        <input type="number" min="0" id="eja_ai_qtd_${id}" class="form-control numero" placeholder="Quantidade de turmas" value="0" disabled>
        </div>

        <hr>

        <h6>Participantes por mês</h6>
        <div class="row">${gerarMeses(id)}</div>

        </div>
        `);
    });
});

// CONTROLE QUANTIDADE
$(document).on('change','.pba,.eja_alf,.eja_ai', function(){

    let id = $(this).data('id');
    let campo = $('#' + this.classList[1] + '_qtd_' + id);
    let val = $(this).val();

    if(val === 'Sim'){
        campo.prop('disabled', false);
    } else {
        campo.val(0);
        campo.prop('disabled', true);
    }
});

// VALIDAÇÃO
function validarFormulario(){

    let valido = true;

    $('.erro').removeClass('erro');

    $('.obrigatorio').each(function(){
        if(!$(this).val()){
            $(this).addClass('erro');
            valido = false;
        }
    });

    $('.numero').each(function(){
        let v = $(this).val();

        if(v < 0 || v === "" || isNaN(v)){
            $(this).addClass('erro');
            valido = false;
        }
    });

    if(!valido){
        alert("Preencha corretamente todos os campos obrigatórios.");
    }

    return valido;
}

// LIMPAR
function limparTudo(){
    location.reload();
}

</script>

</body>
</html>

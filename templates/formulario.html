<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Formulário EJA</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <!-- AVISO -->
    <div style="background:#fff3cd; padding:15px; border-radius:8px; margin-bottom:20px;">
        <b>Atenção:</b> O preenchimento deste formulário substitui automaticamente qualquer envio anterior realizado por este usuário.
        <br>
        Para fins de monitoramento, será considerado sempre o <b>último envio realizado</b>.
    </div>

    <h2>Formulário - Formador Regional</h2>

    <form method="POST" action="/salvar" onsubmit="return validarFormulario()">

        <!-- ESTADO -->
        <label><b>Estado:</b></label><br>
        <select id="estado" name="estado" required>
            <option value="" disabled selected>ESCOLHA O SEU ESTADO</option>
        </select>

        <br><br>

        <!-- MUNICÍPIOS -->
        <label><b>Municípios (pode selecionar vários):</b></label><br>
        <select id="municipios" multiple size="8" name="municipios"></select>

        <br><br>

        <div id="blocos"></div>

        <br>
        <button type="submit">Salvar Informações</button>

        <br><br>

        {% if session.get("tipo") == "gestor" %}
        <a href="/dashboard">
            <button type="button">Ir para Dashboard</button>
        </a>
        {% endif %}

    </form>

</div>

<script>

// ================= VALIDAÇÃO =================
function validarNumero(valor) {
    if (valor === "") return true;
    return /^[0-9]+$/.test(valor);
}

function validarFormulario() {
    let inputs = document.querySelectorAll('input[type="number"]');

    for (let input of inputs) {
        let valor = input.value;

        if (!validarNumero(valor)) {
            alert("Por favor, insira apenas números inteiros maiores ou iguais a zero.");
            input.focus();
            return false;
        }

        if (valor !== "" && parseInt(valor) < 0) {
            alert("Não é permitido inserir números negativos.");
            input.focus();
            return false;
        }
    }

    return true;
}

// ================= ESTADOS =================
fetch("/estados")
.then(r => r.json())
.then(estados => {

    let select = document.getElementById("estado");

    estados.sort((a,b)=>a.nome.localeCompare(b.nome));

    estados.forEach(e=>{
        let opt = document.createElement("option");
        opt.value = e.sigla;
        opt.text = e.nome;
        select.appendChild(opt);
    });

});

// ================= MUNICÍPIOS =================
document.getElementById("estado").addEventListener("change", function(){

    let uf = this.value;

    fetch("/municipios/" + uf)
    .then(r=>r.json())
    .then(muns=>{

        let select = document.getElementById("municipios");
        select.innerHTML = "";

        muns.forEach(m=>{
            let opt = document.createElement("option");
            opt.value = m.id;
            opt.text = m.nome;
            select.appendChild(opt);
        });

    });

});

// ================= MESES =================
const mesAtual = new Date().getMonth() + 1;

function campoMes(label, nome, id, numeroMes){
    let bloqueado = numeroMes > mesAtual ? "disabled" : "";
    return `${label}: <input type="number" min="0" name="${nome}_${id}" ${bloqueado}>`;
}

// ================= REGRA NÃO SEI =================
function controlarQuantidade(select, campoQtdId) {
    let campo = document.getElementById(campoQtdId);

    if (select.value === "não sei") {
        campo.value = 0;
        campo.disabled = true;
    } else {
        campo.disabled = false;
    }
}

// ================= MULTI MUNICÍPIOS =================
let selecionados = new Set();

document.getElementById("municipios").addEventListener("change", function(){

    let blocos = document.getElementById("blocos");

    Array.from(this.selectedOptions).forEach(opt => {

        let id = opt.value;

        if (!selecionados.has(id)) {

            selecionados.add(id);

            let nome = opt.text;

            let div = document.createElement("div");
            div.setAttribute("id", "bloco_" + id);

            div.innerHTML = `
            <h3>${nome}</h3>

            <button type="button" onclick="removerMunicipio('${id}')">
                RETIRAR MUNICÍPIO
            </button>

            <br><br>

            <input type="hidden" name="nome_${id}" value="${nome}">

            <label>Formador Local:</label>
            <select name="formador_local_${id}">
                <option value="sim">Sim</option>
                <option value="não">Não</option>
                <option value="não identificado">Não identificado</option>
            </select><br><br>

            <label>PBA:</label>
            <select name="pba_${id}" onchange="controlarQuantidade(this, 'pba_qtd_${id}')">
                <option value="sim">Sim</option>
                <option value="não">Não</option>
                <option value="não sei">Não sei</option>
            </select>
            Quantidade: <input id="pba_qtd_${id}" type="number" min="0" name="pba_qtd_${id}"><br><br>

            <label>Alfabetização EJA:</label>
            <select name="eja_alf_${id}" onchange="controlarQuantidade(this, 'eja_alf_qtd_${id}')">
                <option value="sim">Sim</option>
                <option value="não">Não</option>
                <option value="não sei">Não sei</option>
            </select>
            Quantidade: <input id="eja_alf_qtd_${id}" type="number" min="0" name="eja_alf_qtd_${id}"><br><br>

            <label>EJA Anos Iniciais:</label>
            <select name="eja_ai_${id}" onchange="controlarQuantidade(this, 'eja_ai_qtd_${id}')">
                <option value="sim">Sim</option>
                <option value="não">Não</option>
                <option value="não sei">Não sei</option>
            </select>
            Quantidade: <input id="eja_ai_qtd_${id}" type="number" min="0" name="eja_ai_qtd_${id}"><br><br>

            <b>Formação presencial (quantidade de participantes por mês)</b><br><br>

            ${campoMes("Jan", "jan", id, 1)}
            ${campoMes("Fev", "fev", id, 2)}
            ${campoMes("Mar", "mar", id, 3)}
            ${campoMes("Abr", "abr", id, 4)}
            ${campoMes("Mai", "mai", id, 5)}
            ${campoMes("Jun", "jun", id, 6)}
            ${campoMes("Jul", "jul", id, 7)}
            ${campoMes("Ago", "ago", id, 8)}
            ${campoMes("Set", "setm", id, 9)}

            <hr>
            `;

            blocos.appendChild(div);
        }

    });

});

// ================= REMOVER MUNICÍPIO =================
function removerMunicipio(id){

    let bloco = document.getElementById("bloco_" + id);
    if (bloco) bloco.remove();

    selecionados.delete(id);

    let select = document.getElementById("municipios");
    Array.from(select.options).forEach(opt=>{
        if (opt.value == id){
            opt.selected = false;
        }
    });

}
</script>

</body>
</html>

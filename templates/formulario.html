<!DOCTYPE html>
<html>
<head>
<script>
async function carregarEstados(){
 let r=await fetch('/estados');
 let estados=await r.json();
 let s=document.getElementById('estado');

 estados.forEach(e=>{
  let o=document.createElement('option');
  o.value=e.sigla;
  o.text=e.nome;
  s.appendChild(o);
 });
}

async function carregarMunicipios(){
 let uf=document.getElementById('estado').value;

 if(!uf){
  alert("Selecione um estado");
  return;
 }

 let r=await fetch('/municipios/'+uf);
 let lista=await r.json();

 let div=document.getElementById('municipios');
 div.innerHTML="<h3>Selecione os municípios:</h3>";

 lista.forEach(m=>{
  div.innerHTML+=`
  <input type="checkbox" name="municipios" value="${m.id}" 
  onchange="bloco(${m.id},'${m.nome}')">${m.nome}<br>`;
 });

 // MOSTRA BOTÃO DE ENVIO
 document.getElementById('btnEnviar').style.display = "block";
}

function bloco(id,nome){
 let c=document.getElementById('blocos');

 if(document.getElementById('b'+id)){
  document.getElementById('b'+id).remove();
  return;
 }

 let div=document.createElement('div');
 div.id='b'+id;

 div.innerHTML=`
 <hr>
 <h3>${nome}</h3>
 <input type="hidden" name="nome_${id}" value="${nome}">

 Há Formador Local?
 <input type="radio" name="formador_local_${id}" value="sim">Sim
 <input type="radio" name="formador_local_${id}" value="nao">Não<br>

 Há turmas de PBA?
 <input type="radio" name="pba_${id}" value="sim">Sim
 <input type="radio" name="pba_${id}" value="nao">Não
 <input type="radio" name="pba_${id}" value="nao_sei">Não sei
 Quantas turmas? <input name="pba_qtd_${id}"><br>

 Há turmas de Alfabetização EJA?
 <input type="radio" name="eja_alf_${id}" value="sim">Sim
 <input type="radio" name="eja_alf_${id}" value="nao">Não
 Quantas turmas? <input name="eja_alf_qtd_${id}"><br>

 EJA Anos Iniciais:
 <input type="radio" name="eja_ai_${id}" value="sim">Sim
 <input type="radio" name="eja_ai_${id}" value="nao">Não
 <input type="radio" name="eja_ai_${id}" value="nao_sei">Não sei
 Quantas turmas? <input name="eja_ai_qtd_${id}"><br>

 Participantes por mês:<br>
 Jan <input name="jan_${id}">
 Fev <input name="fev_${id}">
 Mar <input name="mar_${id}">
 Abr <input name="abr_${id}">
 Mai <input name="mai_${id}">
 Jun <input name="jun_${id}">
 Jul <input name="jul_${id}">
 Ago <input name="ago_${id}">
 Set <input name="setm_${id}">
 `;

 c.appendChild(div);
}

window.onload=carregarEstados;
</script>
</head>

<body>

<h2>Formulário</h2>

<form method="POST" action="/salvar">

Estado:
<select id="estado" name="estado"></select>

<button type="button" onclick="carregarMunicipios()">
Carregar Municípios
</button>

<div id="municipios"></div>

<div id="blocos"></div>

<br>

<button id="btnEnviar" style="display:none;">
Enviar respostas
</button>

</form>

</body>
</html>

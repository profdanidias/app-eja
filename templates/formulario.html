<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Formulário EJA</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h2>Formulário - Formador Regional</h2>

    <form method="POST" action="/salvar">

        <!-- ESTADO -->
        <label><b>Estado:</b></label><br>
        <select id="estado" name="estado"></select>

        <br><br>

        <!-- MUNICÍPIOS -->
        <label><b>Municípios (pode selecionar vários):</b></label><br>
        <select id="municipios" multiple size="8" name="municipios"></select>

        <br><br>

        <!-- BLOCOS DINÂMICOS -->
        <div id="blocos"></div>

        <br>
        <button type="submit">Salvar Informações</button>

        <br><br>

        <!-- DASHBOARD (SÓ GESTOR) -->
        {% if session.get("tipo") == "gestor" %}
        <a href="/dashboard">
            <button type="button">Ir para Dashboard</button>
        </a>
        {% endif %}

    </form>

</div>

<script>
// ================= ESTADOS =================
fetch("/estados")
.then(r => r.json())
.then(estados => {

    let select = document.getElementById("estado");

    estados.sort((a,b)=>a.nome.localeCompare(b.nome));

    estados.forEach(e=>{
        let opt = document.createElement("option");
        opt.value = e.sigla;
        opt.text = e.nome;
        select.appendChild(opt);
    });

});

// ================= MUNICÍPIOS =================
document.getElementById("estado").addEventListener("change", function(){

    let uf = this.value;

    fetch("/municipios/" + uf)
    .then(r=>r.json())
    .then(muns=>{

        let select = document.getElementById("municipios");
        select.innerHTML = "";

        muns.forEach(m=>{
            let opt = document.createElement("option");
            opt.value = m.id;
            opt.text = m.nome;
            select.appendChild(opt);
        });

    });

});

// ================= MULTI MUNICÍPIOS =================
let selecionados = new Set();

document.getElementById("municipios").addEventListener("change", function(){

    let blocos = document.getElementById("blocos");

    Array.from(this.selectedOptions).forEach(opt => {

        let id = opt.value;

        if (!selecionados.has(id)) {

            selecionados.add(id);

            let nome = opt.text;

            let div = document.createElement("div");

            div.innerHTML = `
            <h3>${nome}</h3>

            <input type="hidden" name="nome_${id}" value="${nome}">

            <label>Formador Local:</label>
            <select name="formador_local_${id}">
                <option value="sim">Sim</option>
                <option value="não">Não</option>
            </select><br><br>

            <label>PBA:</label>
            <select name="pba_${id}">
                <option value="sim">Sim</option>
                <option value="não">Não</option>
                <option value="não sei">Não sei</option>
            </select>
            Quantidade: <input type="number" name="pba_qtd_${id}"><br><br>

            <label>Alfabetização EJA:</label>
            <select name="eja_alf_${id}">
                <option value="sim">Sim</option>
                <option value="não">Não</option>
                <option value="não sei">Não sei</option>
            </select>
            Quantidade: <input type="number" name="eja_alf_qtd_${id}"><br><br>

            <label>EJA Anos Iniciais:</label>
            <select name="eja_ai_${id}">
                <option value="sim">Sim</option>
                <option value="não">Não</option>
                <option value="não sei">Não sei</option>
            </select>
            Quantidade: <input type="number" name="eja_ai_qtd_${id}"><br><br>

            <b>Formação presencial (quantidade de participantes por mês)</b><br><br>

            Jan: <input type="number" name="jan_${id}">
            Fev: <input type="number" name="fev_${id}">
            Mar: <input type="number" name="mar_${id}">
            Abr: <input type="number" name="abr_${id}">
            Mai: <input type="number" name="mai_${id}">
            Jun: <input type="number" name="jun_${id}">
            Jul: <input type="number" name="jul_${id}">
            Ago: <input type="number" name="ago_${id}">
            Set: <input type="number" name="setm_${id}">

            <hr>
            `;

            blocos.appendChild(div);
        }

    });

});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Formulário EJA</title>
<link rel="stylesheet" href="/static/style.css">

<style>
.erro {
    border: 2px solid red !important;
}
</style>

</head>

<body>

<div class="container">

<div style="background:#fff3cd; padding:15px; border-radius:8px; margin-bottom:20px;">
<b>Atenção:</b> O preenchimento deste formulário substitui automaticamente qualquer envio anterior realizado por este usuário.
<br>Será considerado sempre o <b>último envio realizado</b>.
</div>

<h2>Formulário - Formador Regional</h2>

<form method="POST" action="/salvar" onsubmit="return validarFormulario()">

<label><b>Estado:</b></label><br>
<select id="estado" name="estado" required>
<option value="" disabled selected>ESCOLHA O SEU ESTADO</option>
</select>

<br><br>

<label><b>Municípios:</b></label><br>
<select id="municipios" multiple size="8" name="municipios"></select>

<br><br>

<div id="blocos"></div>

<br>
<button type="submit">Salvar Informações</button>

{% if session.get("email") == "professoradanidias@gmail.com" %}
<br><br>
<a href="/dashboard">
<button type="button">VER DASHBOARD</button>
</a>
{% endif %}

</form>

</div>

<script>

// ================= VALIDAÇÃO =================
function limparErros(){
    document.querySelectorAll(".erro").forEach(e=>e.classList.remove("erro"));
}

function erroCampo(campo){
    campo.classList.add("erro");
}

function validarFormulario(){

    limparErros();

    let valido = true;

    let selects = document.querySelectorAll("#blocos select");

    selects.forEach(select => {
        if (!select.value){
            erroCampo(select);
            valido = false;
        }
    });

    let inputs = document.querySelectorAll("#blocos input[type='number']");

    inputs.forEach(input => {

        let valor = input.value;

        if (valor === "" || isNaN(valor) || parseInt(valor) < 0){
            erroCampo(input);
            valido = false;
        }

    });

    // REGRA: SIM → quantidade > 0
    document.querySelectorAll("#blocos").forEach(bloco => {

        let selects = bloco.querySelectorAll("select");

        selects.forEach(sel => {

            if (sel.value === "sim"){

                let qtd = sel.parentElement.querySelector("input[type='number']");

                if (qtd && (qtd.value == "" || parseInt(qtd.value) <= 0)){
                    erroCampo(qtd);
                    valido = false;
                }

            }

        });

    });

    if (!valido){
        alert("Existem campos obrigatórios não preenchidos ou inválidos.");
    }

    return valido;
}

// remover erro ao digitar
document.addEventListener("input", function(e){
    if (e.target.classList.contains("erro")){
        e.target.classList.remove("erro");
    }
});

// ================= ESTADOS =================
fetch("/estados")
.then(r=>r.json())
.then(estados=>{
    let select = document.getElementById("estado");
    estados.sort((a,b)=>a.nome.localeCompare(b.nome));
    estados.forEach(e=>{
        let opt=document.createElement("option");
        opt.value=e.sigla;
        opt.text=e.nome;
        select.appendChild(opt);
    });
});

// ================= MUNICÍPIOS =================
document.getElementById("estado").addEventListener("change", function(){

    fetch("/municipios/"+this.value)
    .then(r=>r.json())
    .then(muns=>{
        let select=document.getElementById("municipios");
        select.innerHTML="";
        muns.forEach(m=>{
            let opt=document.createElement("option");
            opt.value=m.id;
            opt.text=m.nome;
            select.appendChild(opt);
        });
    });

});

// ================= MESES =================
const mesAtual = new Date().getMonth() + 1;

function campoMes(label,nome,id,num){
    let dis = num > mesAtual ? "disabled" : "";
    return `<div style="display:inline-block;margin-right:10px;">
    ${label}: <input type="number" min="0" name="${nome}_${id}" ${dis}>
    </div>`;
}

// ================= NÃO / NÃO SEI =================
function controlarQuantidade(select,id){

    let campo = document.getElementById(id);

    if (select.value === "não" || select.value === "não sei"){
        campo.value = 0;
        campo.disabled = true;
    } else {
        campo.disabled = false;
    }
}

// ================= MUNICÍPIOS =================
let selecionados = new Set();

document.getElementById("municipios").addEventListener("change", function(){

    let blocos = document.getElementById("blocos");

    Array.from(this.selectedOptions).forEach(opt=>{

        let id = opt.value;

        if (!selecionados.has(id)){

            selecionados.add(id);

            let nome = opt.text;

            let div = document.createElement("div");
            div.id = "bloco_"+id;

            div.innerHTML = `
            <h3>${nome}</h3>

            <button type="button" onclick="removerMunicipio('${id}')">RETIRAR MUNICÍPIO</button><br><br>

            <input type="hidden" name="nome_${id}" value="${nome}">

            Há Formador Local?
            <select name="formador_local_${id}">
            <option value="">Selecione</option>
            <option value="sim">Sim</option>
            <option value="não">Não</option>
            <option value="não identificado">Não identificado</option>
            </select><br><br>

            Há turma de PBA?
            <select name="pba_${id}" onchange="controlarQuantidade(this,'pba_qtd_${id}')">
            <option value="">Selecione</option>
            <option value="sim">Sim</option>
            <option value="não">Não</option>
            <option value="não sei">Não sei</option>
            </select>
            Se sim, quantas turmas? <input id="pba_qtd_${id}" type="number" min="0" name="pba_qtd_${id}"><br><br>

            Há turma de Alfabetização da EJA?
            <select name="eja_alf_${id}" onchange="controlarQuantidade(this,'eja_alf_qtd_${id}')">
            <option value="">Selecione</option>
            <option value="sim">Sim</option>
            <option value="não">Não</option>
            <option value="não sei">Não sei</option>
            </select>
            Se sim, quantas turmas? <input id="eja_alf_qtd_${id}" type="number" min="0" name="eja_alf_qtd_${id}"><br><br>

            Há turma de EJA (Anos Iniciais do Ensino Fundamental):
            <select name="eja_ai_${id}" onchange="controlarQuantidade(this,'eja_ai_qtd_${id}')">
            <option value="">Selecione</option>
            <option value="sim">Sim</option>
            <option value="não">Não</option>
            <option value="não sei">Não sei</option>
            </select>
            Se sim, quantas turmas? <input id="eja_ai_qtd_${id}" type="number" min="0" name="eja_ai_qtd_${id}"><br><br>

            <b>Formação presencial (Quantidade de participantes por mês | PBA + Escolas)</b><br><br>

            ${campoMes("Jan","jan",id,1)}
            ${campoMes("Fev","fev",id,2)}
            ${campoMes("Mar","mar",id,3)}
            ${campoMes("Abr","abr",id,4)}
            ${campoMes("Mai","mai",id,5)}
            ${campoMes("Jun","jun",id,6)}
            ${campoMes("Jul","jul",id,7)}
            ${campoMes("Ago","ago",id,8)}
            ${campoMes("Set","setm",id,9)}

            <hr>
            `;

            blocos.appendChild(div);
        }

    });

});

// ================= REMOVER =================
function removerMunicipio(id){
    document.getElementById("bloco_"+id)?.remove();
    selecionados.delete(id);

    let select = document.getElementById("municipios");
    Array.from(select.options).forEach(o=>{
        if (o.value==id) o.selected=false;
    });
}

</script>

</body>
</html>

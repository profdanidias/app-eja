<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário EJA</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

    <style>
        body {
            background: #f5f5f5;
        }
        .container-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-top: 30px;
            box-shadow: 0 0 10px #00000020;
        }
        .municipio-card {
            background: #ffffff;
            border-left: 5px solid #0d6efd;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            position: relative;
        }
        .municipio-titulo {
            font-size: 20px;
            font-weight: bold;
            color: #0d6efd;
            margin-bottom: 15px;
        }
        .btn-remover {
            position: absolute;
            top: 15px;
            right: 15px;
        }
        .select2-container .select2-selection--single,
        .select2-container .select2-selection--multiple {
            min-height: 38px !important;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="container-box">

        <h3 class="mb-4">Formulário EJA</h3>

        <form action="/salvar" method="POST">

            <input type="hidden" name="usuario_id" value="{{ usuario_id }}">

            <!-- Estado -->
            <div class="mb-3">
                <label class="form-label">Estado</label>
                <select id="estado" name="estado" class="form-select" required>
                    <option value="">Selecione...</option>
                    {% for estado in estados %}
                        <option value="{{ estado.sigla }}">{{ estado.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Municípios (MULTISELECT) -->
            <div class="mb-3">
                <label class="form-label">Municípios</label>
                <select id="municipios" name="municipios" class="form-select" multiple required>
                    <option value="">Selecione um estado primeiro...</option>
                </select>
            </div>

            <hr>

            <!-- ÁREA DINÂMICA DOS MUNICÍPIOS -->
            <div id="area-municipios"></div>

            <button type="submit" class="btn btn-primary mt-3">Enviar</button>

        </form>

    </div>
</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>

    // Inicializar Select2 SOMENTE depois que o DOM estiver pronto
    $(function() {
        setTimeout(() => {
            $('#estado').select2({
                placeholder: "Selecione um estado",
                width: '100%'
            });

            $('#municipios').select2({
                placeholder: "Selecione os municípios",
                width: '100%'
            });
        }, 50);
    });

    // Carregar municípios ao escolher estado
    $('#estado').on('change', function() {
        let estado = $(this).val();

        $('#municipios').html('<option>Carregando...</option>');

        $.get('/municipios/' + estado, function(data) {
            $('#municipios').empty();
            data.forEach(function(m) {
                $('#municipios').append(
                    `<option value="${m.id}" data-nome="${m.nome}">${m.nome}</option>`
                );
            });

            $('#municipios').trigger('change.select2');
        });
    });

    // Criar cards dinâmicos ao selecionar municípios
    $('#municipios').on('change', function() {
        let selecionados = $(this).find(':selected');
        let area = $('#area-municipios');
        area.empty();

        selecionados.each(function() {
            let id = $(this).val();
            let nome = $(this).data('nome');

            area.append(`
                <div class="municipio-card" id="card-${id}">
                    
                    <button type="button" class="btn btn-danger btn-sm btn-remover" data-id="${id}">
                        Remover
                    </button>

                    <div class="municipio-titulo">${nome}</div>

                    <!-- Formador Local -->
                    <div class="mb-3">
                        <label>Há Formador Local?</label>
                        <select name="formador_local_${id}" class="form-select">
                            <option value="">Selecione...</option>
                            <option value="Sim">Sim</option>
                            <option value="Não">Não</option>
                            <option value="Não Identificado">Não Identificado</option>
                        </select>
                    </div>

                    <!-- PBA -->
                    <div class="mb-3">
                        <label>Há Turmas de PBA?</label>
                        <select name="pba_${id}" class="form-select pba" data-id="${id}">
                            <option value="">Selecione...</option>
                            <option value="Sim">Sim</option>
                            <option value="Não">Não</option>
                            <option value="Não sei">Não sei</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Quantidade PBA</label>
                        <input type="number" name="pba_qtd_${id}" id="pba_qtd_${id}" class="form-control" value="0" disabled>
                    </div>

                    <!-- Alfabetização EJA -->
                    <div class="mb-3">
                        <label>Há Turmas de Alfabetização EJA?</label>
                        <select name="eja_alf_${id}" class="form-select eja_alf" data-id="${id}">
                            <option value="">Selecione...</option>
                            <option value="Sim">Sim</option>
                            <option value="Não">Não</option>
                            <option value="Não sei">Não sei</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Quantidade</label>
                        <input type="number" name="eja_alf_qtd_${id}" id="eja_alf_qtd_${id}" class="form-control" value="0" disabled>
                    </div>

                    <!-- EJA Anos Iniciais -->
                    <div class="mb-3">
                        <label>Há Turmas de EJA - Anos Iniciais?</label>
                        <select name="eja_ai_${id}" class="form-select eja_ai" data-id="${id}">
                            <option value="">Selecione...</option>
                            <option value="Sim">Sim</option>
                            <option value="Não">Não</option>
                            <option value="Não sei">Não sei</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Quantidade</label>
                        <input type="number" name="eja_ai_qtd_${id}" id="eja_ai_qtd_${id}" class="form-control" value="0" disabled>
                    </div>

                    <hr>

                    <!-- Meses -->
                    <h6>Número Total de Participantes em Formações Presenciais</h6>

                    <div class="row">
                        {% for mes in ['jan','fev','mar','abr','mai','jun','jul','ago','setm','out','nov','dez'] %}
                        <div class="col-md-4 mb-3">
                            <label>{{ mes|upper }}</label>
                            <input type="number" name="{{ mes }}_${id}" class="form-control" value="0">
                        </div>
                        {% endfor %}
                    </div>

                </div>
            `);
        });
    });

    // Remover card e desmarcar município
    $(document).on('click', '.btn-remover', function() {
        let id = $(this).data('id');

        $('#card-' + id).remove();

        let select = $('#municipios');
        let valores = select.val().filter(v => v !== id);
        select.val(valores).trigger('change');
    });

    // Lógica para abrir/fechar campos de quantidade
    $(document).on('change', '.pba', function() {
        let id = $(this).data('id');
        let val = $(this).val();
        let campo = $('#pba_qtd_' + id);

        if (val === 'Sim') campo.prop('disabled', false);
        else { campo.val(0); campo.prop('disabled', true); }
    });

    $(document).on('change', '.eja_alf', function() {
        let id = $(this).data('id');
        let val = $(this).val();
        let campo = $('#eja_alf_qtd_' + id);

        if (val === 'Sim') campo.prop('disabled', false);
        else { campo.val(0); campo.prop('disabled', true); }
    });

    $(document).on('change', '.eja_ai', function() {
        let id = $(this).data('id');
        let val = $(this).val();
        let campo = $('#eja_ai_qtd_' + id);

        if (val === 'Sim') campo.prop('disabled', false);
        else { campo.val(0); campo.prop('disabled', true); }
    });

</script>

</body>
</html>

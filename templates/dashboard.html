<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<h2>Dashboard de Monitoramento</h2>

<form method="GET">
    <label><b>Filtrar por Estado:</b></label><br>
    <select name="estado" multiple size="5">
        <option value="PB">Paraíba</option>
        <option value="PE">Pernambuco</option>
        <option value="RN">Rio Grande do Norte</option>
        <option value="CE">Ceará</option>
        <option value="BA">Bahia</option>
    </select>
    <br><br>
    <button type="submit">Filtrar</button>
</form>

<hr>

<canvas id="graficoEstado"></canvas>
<canvas id="graficoMeses"></canvas>
<canvas id="graficoFuncoes"></canvas>

<script>
let dadosEstado = {{dados_estado|safe}};
let meses = {{meses|safe}};
let funcoes = {{funcoes|safe}};

// ESTADOS
new Chart(document.getElementById('graficoEstado'), {
    type: 'bar',
    data: {
        labels: dadosEstado.map(x => x[0]),
        datasets: [{
            label: 'Participantes por Estado',
            data: dadosEstado.map(x => x[1])
        }]
    }
});

// MESES
new Chart(document.getElementById('graficoMeses'), {
    type: 'line',
    data: {
        labels: ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set"],
        datasets: [{
            label: 'Participantes por mês',
            data: meses
        }]
    }
});

// FUNÇÕES
new Chart(document.getElementById('graficoFuncoes'), {
    type: 'pie',
    data: {
        labels: funcoes.map(x => x[0]),
        datasets: [{
            data: funcoes.map(x => x[1])
        }]
    }
});
</script>

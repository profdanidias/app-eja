<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard EJA - Completo</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-geo@4"></script>

<style>
body { font-family: Arial; background:#f4f6f9; margin:20px; }
.card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; }

.grid {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:10px;
}

select, input { padding:6px; width:100%; }
button { padding:8px 12px; margin-top:10px; cursor:pointer; }
</style>
</head>

<body>

<h2>📊 Dashboard Nacional EJA</h2>

<div class="card">

<h3>Filtros</h3>

<div class="grid">

<select id="estado"><option value="">Estado</option></select>
<select id="municipio"><option value="">Município</option></select>
<select id="formador"><option value="">Formador</option></select>

<select id="formadorLocal">
<option value="">Formador Local</option>
<option value="sim">Sim</option>
<option value="não">Não</option>
<option value="não identificado">Não identificado</option>
</select>

<input id="pba" type="number" min="0" placeholder="PBA ≥">
<input id="ejaalf" type="number" min="0" placeholder="EJA Alf ≥">
<input id="ejaai" type="number" min="0" placeholder="EJA AI ≥">
<input id="total" type="number" min="0" placeholder="Participantes ≥">

</div>

<button onclick="filtrar()">Aplicar filtros</button>
<button onclick="limpar()">Limpar</button>

<a href="/exportar_excel"><button>Exportar Excel</button></a>
<a href="/exportar_pdf"><button>Exportar PDF</button></a>

</div>

<div class="card">
<h3>🗺️ Mapa do Brasil</h3>
<canvas id="mapa"></canvas>
<p id="estadoSelecionado"></p>
</div>

<div class="card">
<h3>📋 Municípios</h3>
<table border="1" width="100%" id="tabela"></table>
</div>

<script>

const dados = {{ dados | tojson }};
let dadosFiltrados = [...dados];

let geoData;
let chart;


// ================= FILTROS =================
function preencher(id, campo){
    let set = new Set(dados.map(d=>d[campo]));
    let el = document.getElementById(id);
    set.forEach(v=>{
        if(v) el.innerHTML += `<option value="${v}">${v}</option>`;
    });
}

preencher("estado","estado");
preencher("municipio","municipio");
preencher("formador","formador");


// ================= TABELA =================
function render(lista){
    let t = document.getElementById("tabela");

    if(lista.length === 0){
        t.innerHTML = "<tr><td>📌 Dados não enviados</td></tr>";
        return;
    }

    t.innerHTML = `
    <tr>
        <th>Município</th>
        <th>Estado</th>
        <th>Formador</th>
        <th>Data</th>
        <th>Total</th>
    </tr>`;

    lista.forEach(d=>{
        t.innerHTML += `
        <tr>
            <td>${d.municipio}</td>
            <td>${d.estado}</td>
            <td>${d.formador}</td>
            <td>${d.data}</td>
            <td>${d.total}</td>
        </tr>`;
    });
}

render(dados);


// ================= FILTRO =================
function filtrar(){

    dadosFiltrados = dados.filter(d=>{
        return (!estado.value || d.estado === estado.value)
        && (!municipio.value || d.municipio === municipio.value)
        && (!formador.value || d.formador === formador.value)
        && (!formadorLocal.value || d.formador_local === formadorLocal.value)
        && (d.pba >= (pba.value || 0))
        && (d.eja_alf >= (ejaalf.value || 0))
        && (d.eja_ai >= (ejaai.value || 0))
        && (d.total >= (total.value || 0));
    });

    render(dadosFiltrados);
    atualizarMapa();
}

function limpar(){
    location.reload();
}


// ================= MAPA =================
async function carregarMapa(){

    const res = await fetch("https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/brazil-states.geojson");
    geoData = await res.json();

    atualizarMapa();
}

function calcularTotais(){
    let mapa = {};
    dadosFiltrados.forEach(d=>{
        mapa[d.estado] = (mapa[d.estado] || 0) + d.total;
    });
    return mapa;
}

function atualizarMapa(){

    if(!geoData) return;

    let totais = calcularTotais();

    const features = geoData.features.map(f=>{
        let nome = f.properties.name;

        return {
            feature: f,
            value: totais[nome] || 0
        };
    });

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("mapa"), {
        type: "choropleth",
        data: {
            labels: geoData.features.map(f=>f.properties.name),
            datasets: [{
                label: "Participantes",
                data: features
            }]
        },
        options: {
            plugins: {
                tooltip: {
                    callbacks: {
                        label: ctx => {
                            let nome = ctx.raw.feature.properties.name;
                            let valor = ctx.raw.value;
                            return `${nome}: ${valor || "Dados não enviados"}`;
                        }
                    }
                }
            },
            onClick: (evt, elements) => {

                if(elements.length){
                    let estadoSel = geoData.features[elements[0].index].properties.name;

                    document.getElementById("estadoSelecionado").innerText =
                        "Estado selecionado: " + estadoSel;

                    document.getElementById("estado").value = estadoSel;

                    filtrar();
                }
            }
        }
    });
}

carregarMapa();

</script>

</body>
</html>

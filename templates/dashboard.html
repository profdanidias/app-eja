<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="container">

<h2>📊 Painel Nacional EJA</h2>

<!-- FILTRO DINÂMICO -->
<form method="GET" class="filtro">
    <label>Estados:</label>
    <select name="estado" multiple>
        {% for e in dados_estado %}
        <option value="{{e[0]}}">{{e[0]}}</option>
        {% endfor %}
    </select>
    <button>Filtrar</button>
</form>

<!-- CARDS -->
<div class="cards">
    <div class="card">
        <h3>Total Participantes</h3>
        <p id="total"></p>
    </div>

    <div class="card">
        <h3>Estados Monitorados</h3>
        <p>{{dados_estado|length}}</p>
    </div>

    <div class="card">
        <h3>Usuários por Função</h3>
        <p>{{funcoes|length}}</p>
    </div>
</div>

<!-- GRÁFICOS -->
<div class="graficos">

<canvas id="estadoChart"></canvas>
<canvas id="mesChart"></canvas>

</div>

</div>

<script>
let dados = {{dados_estado|safe}};
let meses = {{meses|safe}};
let funcoes = {{funcoes|safe}};

// TOTAL
let total = 0;
meses.forEach(v => total += (v || 0));
document.getElementById("total").innerText = total;

// ESTADOS
new Chart(document.getElementById("estadoChart"), {
    type: "bar",
    data: {
        labels: dados.map(x=>x[0]),
        datasets: [{
            label: "Participantes",
            data: dados.map(x=>x[1])
        }]
    }
});

// MESES
new Chart(document.getElementById("mesChart"), {
    type: "line",
    data: {
        labels: ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set"],
        datasets: [{
            label: "Participantes por mês",
            data: meses
        }]
    }
});
</script>

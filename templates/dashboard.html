<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Highcharts Maps -->
    <script src="https://code.highcharts.com/maps/highmaps.js"></script>
    <script src="https://code.highcharts.com/mapdata/countries/br/br-all.js"></script>

    <style>
        body { background: #f5f6fa; }
        .card { border-radius: 12px; }
        .chart-container { height: 350px; }
    </style>
</head>

<body class="p-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📊 Dashboard de Monitoramento</h2>
        <div>
            <a href="/exportar_excel" class="btn btn-success btn-sm me-2">Exportar Excel</a>
            <a href="/exportar_pdf" class="btn btn-danger btn-sm">Exportar PDF</a>
        </div>
    </div>

    <!-- ================= FILTROS ================= -->
    <div class="card shadow p-3 mb-4">
        <h5>Filtros</h5>

        <div class="row">
            <div class="col-md-3">
                <label>Estado</label>
                <select id="filtroEstado" class="form-select" onchange="onEstadoChange()">
                    <option value="">Todos</option>
                    {% for e in estados_lista %}
                        <option value="{{ e }}">{{ e }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-3">
                <label>Município</label>
                <select id="filtroMunicipio" class="form-select">
                    <option value="">Todos</option>
                </select>
            </div>

            <div class="col-md-3">
                <label>Formador</label>
                <select id="filtroFormador" class="form-select">
                    <option value="">Todos</option>
                    {% for f in formadores_lista %}
                        <option value="{{ f }}">{{ f }}</option>
                    {% endfor %}
                </select>
            </div>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard EJA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-geo"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

<style>
body { font-family: Arial; background:#f4f6f9; margin:20px; }
.card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; }
</style>
</head>

<body>

<h2>Painel Nacional EJA</h2>

<div class="card">
<canvas id="mapa"></canvas>
<p id="infoEstado"></p>
</div>

<div class="card">
<table border="1" width="100%" id="tabela"></table>
</div>

<script>

const dados = {{ dados | tojson }};
let dadosFiltrados = [...dados];

// ================= AGRUPAR POR ESTADO =================
function totalPorEstado(){
    let mapa = {};
    dados.forEach(d=>{
        mapa[d.estado] = (mapa[d.estado] || 0) + d.total;
    });
    return mapa;
}

// ================= TABELA =================
function render(lista){
    let t = document.getElementById("tabela");

    if(lista.length === 0){
        t.innerHTML = "<tr><td>Dados não enviados</td></tr>";
        return;
    }

    t.innerHTML = "<tr><th>Município</th><th>Estado</th><th>Formador</th><th>Data</th><th>Total</th></tr>";

    lista.forEach(d=>{
        t.innerHTML += `<tr>
        <td>${d.municipio}</td>
        <td>${d.estado}</td>
        <td>${d.formador}</td>
        <td>${d.data}</td>
        <td>${d.total}</td>
        </tr>`;
    });
}

render(dados);

// ================= MAPA REAL =================
(async () => {

const res = await fetch("https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/brazil-states.geojson");
const geo = await res.json();

const totais = totalPorEstado();

const features = geo.features.map(f=>{
    let nome = f.properties.name;
    let valor = totais[nome] || 0;
    return {feature: f, value: valor};
});

new Chart(document.getElementById("mapa"), {
    type: "choropleth",
    data: {
        labels: geo.features.map(f=>f.properties.name),
        datasets: [{
            label: "Participantes",
            data: features
        }]
    },
    options: {
        plugins: {
            tooltip: {
                callbacks: {
                    label: ctx => ctx.raw.feature.properties.name
                }
            }
        },
        onClick: (evt, elements, chart) => {
            if(elements.length){
                let estado = chart.data.labels[elements[0].index];
                document.getElementById("infoEstado").innerText = "Estado: " + estado;

                dadosFiltrados = dados.filter(d=>d.estado === estado);
                render(dadosFiltrados);
            }
        }
    }
});

})();

</script>

</body>
</html>

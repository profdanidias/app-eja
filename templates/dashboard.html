<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard EJA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin: 20px;
    background: #f5f7fa;
}

h1 {
    text-align: center;
}

.filtro {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

select {
    width: 100%;
    padding: 10px;
}

.cards {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

.graficos {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.grafico {
    background: white;
    padding: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>Dashboard - Pacto EJA</h1>

{% if meses %}

<!-- FILTRO -->
<div class="filtro">
    <label><b>Filtrar por Estado:</b></label>
    <select id="filtroEstado" multiple></select>
</div>

<!-- CARDS -->
<div class="cards">
    <div class="card">
        <h2 id="totalEstados"></h2>
        <p>Estados</p>
    </div>

    <div class="card">
        <h2 id="totalParticipantes"></h2>
        <p>Participantes</p>
    </div>

    <div class="card">
        <h2>{{ funcoes|length }}</h2>
        <p>Tipos de usuários</p>
    </div>
</div>

<!-- GRÁFICOS -->
<div class="graficos">
    <div class="grafico">
        <h3>Participantes por Estado</h3>
        <canvas id="graficoEstado"></canvas>
    </div>

    <div class="grafico">
        <h3>Participantes por Mês</h3>
        <canvas id="graficoMes"></canvas>
    </div>

    <div class="grafico">
        <h3>Usuários por Função</h3>
        <canvas id="graficoFuncao"></canvas>
    </div>
</div>

<script>

const dadosEstadoOriginal = {{ dados_estado | tojson }};
const mesesOriginal = {{ meses | tojson }};
const funcoes = {{ funcoes | tojson }};

// ================= POPULAR FILTRO =================
const select = document.getElementById("filtroEstado");

dadosEstadoOriginal.forEach(e => {
    let option = document.createElement("option");
    option.value = e[0];
    option.text = e[0];
    select.appendChild(option);
});

// ================= GRÁFICOS =================
let graficoEstado, graficoMes, graficoFuncao;

function atualizarDashboard() {

    const selecionados = Array.from(select.selectedOptions).map(o => o.value);

    let dadosFiltrados = dadosEstadoOriginal;

    if (selecionados.length > 0) {
        dadosFiltrados = dadosEstadoOriginal.filter(e => selecionados.includes(e[0]));
    }

    // CARD TOTAL
    document.getElementById("totalEstados").innerText = dadosFiltrados.length;

    const totalParticipantes = dadosFiltrados.reduce((acc, e) => acc + e[1], 0);
    document.getElementById("totalParticipantes").innerText = totalParticipantes;

    // ================= GRAFICO ESTADO =================
    if (graficoEstado) graficoEstado.destroy();

    graficoEstado = new Chart(document.getElementById("graficoEstado"), {
        type: "bar",
        data: {
            labels: dadosFiltrados.map(e => e[0]),
            datasets: [{
                label: "Participantes",
                data: dadosFiltrados.map(e => e[1]),
            }]
        }
    });

    // ================= GRAFICO MES =================
    if (graficoMes) graficoMes.destroy();

    graficoMes = new Chart(document.getElementById("graficoMes"), {
        type: "line",
        data: {
            labels: ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set"],
            datasets: [{
                label: "Participantes",
                data: mesesOriginal,
            }]
        }
    });

    // ================= GRAFICO FUNÇÃO =================
    if (graficoFuncao) graficoFuncao.destroy();

    graficoFuncao = new Chart(document.getElementById("graficoFuncao"), {
        type: "pie",
        data: {
            labels: funcoes.map(f => f[0]),
            datasets: [{
                data: funcoes.map(f => f[1]),
            }]
        }
    });

}

// evento filtro
select.addEventListener("change", atualizarDashboard);

// inicializa
atualizarDashboard();

</script>

{% else %}
<h2 style="text-align:center;">Sem dados</h2>
{% endif %}

</body>
</html>

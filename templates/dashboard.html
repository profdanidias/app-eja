<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard EJA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background:#f4f6f9;
    margin:20px;
}
.card {
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}
</style>

</head>
<body>

<h2>Painel de Monitoramento EJA</h2>

<div class="card">
<h3>Participação por Estado</h3>
<canvas id="graficoEstado"></canvas>
</div>

<div class="card">
<h3>Participação por Região</h3>
<canvas id="graficoRegiao"></canvas>
</div>

<div class="card">
<h3>Top 5 Municípios</h3>
<ul id="topMunicipios"></ul>
</div>

<div class="card">
<h3>Municípios</h3>
<table border="1" width="100%">
<tr>
<th>Município</th>
<th>Estado</th>
<th>Formador</th>
<th>Total</th>
</tr>

{% for m in dados_municipio %}
<tr>
<td>{{m[0]}}</td>
<td>{{m[1]}}</td>
<td>{{m[2]}}</td>
<td>{{m[3]}}</td>
</tr>
{% endfor %}

</table>
</div>

<script>

const estados = {{ dados_estado | tojson }};
const regioes = {{ dados_regiao | tojson }};
const topMunicipios = {{ top_municipios | tojson }};

// ESTADOS
new Chart(document.getElementById("graficoEstado"), {
    type: "bar",
    data: {
        labels: estados.map(e => e[0]),
        datasets: [{
            data: estados.map(e => e[1])
        }]
    }
});

// REGIÕES
new Chart(document.getElementById("graficoRegiao"), {
    type: "pie",
    data: {
        labels: Object.keys(regioes),
        datasets: [{
            data: Object.values(regioes)
        }]
    }
});

// TOP MUNICÍPIOS
const lista = document.getElementById("topMunicipios");

topMunicipios.forEach(m => {
    lista.innerHTML += `<li><b>${m[0]}</b> (${m[1]}) - ${m[3]}</li>`;
});

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard EJA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-geo"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

<style>
body { font-family: Arial; background:#f4f6f9; margin:20px; }
.card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; }
</style>
</head>

<body>

<h2>Painel Nacional EJA</h2>

<button onclick="exportarExcel()">Exportar Excel</button>
<button onclick="exportarPDF()">Exportar PDF</button>

<div class="card">
<canvas id="mapa"></canvas>
</div>

<div class="card">
<table border="1" width="100%" id="tabela"></table>
</div>

<script>

const dados = {{ dados | tojson }};

// tabela
function render(lista){
    let t = document.getElementById("tabela");
    t.innerHTML = "<tr><th>Município</th><th>Estado</th><th>Formador</th><th>Data</th><th>Total</th></tr>";

    lista.forEach(d=>{
        t.innerHTML += `<tr>
        <td>${d.municipio}</td>
        <td>${d.estado}</td>
        <td>${d.formador}</td>
        <td>${d.data}</td>
        <td>${d.total}</td>
        </tr>`;
    });
}

render(dados);

// mapa real
(async () => {

const res = await fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json");
const world = await res.json();

new Chart(document.getElementById("mapa"), {
    type: "choropleth",
    data: {
        labels: ["Brasil"],
        datasets: [{
            label: "Mapa",
            data: [{feature: topojson.feature(world, world.objects.countries).features.find(f=>f.properties.name==="Brazil"), value: 1}]
        }]
    }
});

})();

function exportarExcel(){
    window.location = "/exportar_excel";
}

function exportarPDF(){
    window.location = "/exportar_pdf";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard EJA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f6f9; margin:20px; }
.card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
select,input { padding:6px; }
</style>

</head>
<body>

<h2>Painel Nacional EJA</h2>

<div class="card">
<h3>Filtros Inteligentes</h3>

<div class="grid">
<select id="estado"></select>
<select id="municipio"></select>
<select id="formador"></select>
<select id="formadorLocal"></select>

<input id="pba" type="number" placeholder="PBA ≥">
<input id="ejaalf" type="number" placeholder="EJA Alf ≥">
<input id="ejaai" type="number" placeholder="EJA AI ≥">
<input id="participantes" type="number" placeholder="Participantes ≥">
</div>

<button onclick="filtrar()">Aplicar</button>
</div>

<div class="card">
<h3>Mapa Interativo</h3>
<canvas id="grafico"></canvas>
</div>

<div class="card">
<h3>Resultados</h3>
<table border="1" width="100%" id="tabela"></table>
</div>

<script>

const dados = {{ dados | tojson }};

// transformação dos dados
function total(d){
    return d.slice(11,20).reduce((a,b)=>a+(b||0),0);
}

function render(lista){

    let t = document.getElementById("tabela");
    t.innerHTML = "<tr><th>Município</th><th>Estado</th><th>Formador</th><th>Total</th></tr>";

    lista.forEach(d=>{
        t.innerHTML += `<tr>
        <td>${d[3]}</td>
        <td>${d[4]}</td>
        <td>${d[1]}</td>
        <td>${total(d)}</td>
        </tr>`;
    });
}

render(dados);

function filtrar(){

    let lista = dados.filter(d=>{
        return total(d) >= (participantes.value || 0);
    });

    render(lista);
}

new Chart(document.getElementById("grafico"), {
    type: "bar",
    data: {
        labels: dados.map(d=>d[4]),
        datasets:[{data: dados.map(d=>total(d))}]
    }
});

</script>

</body>
</html>

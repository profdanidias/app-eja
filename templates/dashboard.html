<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard EJA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin: 20px;
    background: #f5f7fa;
}

h1 {
    text-align: center;
    color: #2c3e50;
}

.cards {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    text-align: center;
}

.card h2 {
    margin: 0;
    font-size: 28px;
    color: #2980b9;
}

.graficos {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.grafico {
    background: white;
    padding: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>Dashboard - Pacto EJA</h1>

{% if meses %}

<!-- CARDS -->
<div class="cards">
    <div class="card">
        <h2>{{ dados_estado|length }}</h2>
        <p>Estados com dados</p>
    </div>

    <div class="card">
        <h2>{{ meses | sum }}</h2>
        <p>Total de participantes</p>
    </div>

    <div class="card">
        <h2>{{ funcoes|length }}</h2>
        <p>Tipos de usuários</p>
    </div>
</div>

<!-- GRÁFICOS -->
<div class="graficos">

    <div class="grafico">
        <h3>Participantes por Estado</h3>
        <canvas id="graficoEstado"></canvas>
    </div>

    <div class="grafico">
        <h3>Participantes por Mês</h3>
        <canvas id="graficoMes"></canvas>
    </div>

    <div class="grafico">
        <h3>Usuários por Função</h3>
        <canvas id="graficoFuncao"></canvas>
    </div>

</div>

<script>

const estados = {{ dados_estado | tojson }};
new Chart(document.getElementById("graficoEstado"), {
    type: "bar",
    data: {
        labels: estados.map(e => e[0]),
        datasets: [{
            label: "Participantes",
            data: estados.map(e => e[1]),
        }]
    }
});

const meses = {{ meses | tojson }};
new Chart(document.getElementById("graficoMes"), {
    type: "line",
    data: {
        labels: ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set"],
        datasets: [{
            label: "Participantes",
            data: meses,
        }]
    }
});

const funcoes = {{ funcoes | tojson }};
new Chart(document.getElementById("graficoFuncao"), {
    type: "pie",
    data: {
        labels: funcoes.map(f => f[0]),
        datasets: [{
            data: funcoes.map(f => f[1]),
        }]
    }
});

</script>

{% else %}

<h2 style="text-align:center; color:#999;">
Ainda não há dados cadastrados.
</h2>

{% endif %}

</body>
</html>

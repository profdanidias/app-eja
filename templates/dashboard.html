<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard EJA</title>

<style>
body { font-family: Arial; background:#f4f6f9; margin:20px; }

.card {
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:10px;
}

select, input { padding:6px; width:100%; }

button {
    padding:8px 12px;
    margin-top:10px;
    cursor:pointer;
}

.estado {
    fill:#ddd;
    stroke:#999;
    cursor:pointer;
}

.estado:hover {
    fill:#66b3ff;
}
</style>
</head>

<body>

<h2>📊 Dashboard Nacional EJA</h2>

<!-- FILTROS -->
<div class="card">

<h3>Filtros</h3>

<div class="grid">

<select id="estado"><option value="">Estado</option></select>
<select id="municipio"><option value="">Município</option></select>
<select id="formador"><option value="">Formador</option></select>

<select id="formadorLocal">
<option value="">Formador Local</option>
<option value="sim">Sim</option>
<option value="não">Não</option>
<option value="não identificado">Não identificado</option>
</select>

<input id="pba" type="number" min="0" placeholder="PBA ≥">
<input id="ejaalf" type="number" min="0" placeholder="EJA Alf ≥">
<input id="ejaai" type="number" min="0" placeholder="EJA AI ≥">
<input id="total" type="number" min="0" placeholder="Participantes ≥">

</div>

<button onclick="filtrar()">Aplicar filtros</button>
<button onclick="limpar()">Limpar</button>

<a href="/exportar_excel"><button>Exportar Excel</button></a>
<a href="/exportar_pdf"><button>Exportar PDF</button></a>

</div>

<!-- MAPA SIMPLES FUNCIONAL -->
<div class="card">
<h3>🗺️ Estados (clique para filtrar)</h3>

<div id="mapaEstados"></div>
<p id="estadoSelecionado"></p>

</div>

<!-- TABELA -->
<div class="card">
<h3>📋 Municípios</h3>
<table border="1" width="100%" id="tabela"></table>
</div>

<script>

const dados = {{ dados | tojson }};

// IMPORTANTE: base completa
let dadosBase = [...dados];
let dadosFiltrados = [...dados];

// ================= PREENCHER FILTROS =================
function preencher(id, campo){
    let set = new Set(dadosBase.map(d=>d[campo]));
    let el = document.getElementById(id);

    set.forEach(v=>{
        if(v) el.innerHTML += `<option value="${v}">${v}</option>`;
    });
}

preencher("estado","estado");
preencher("municipio","municipio");
preencher("formador","formador");

// ================= TABELA =================
function render(lista){

    let t = document.getElementById("tabela");

    if(lista.length === 0){
        t.innerHTML = "<tr><td>📌 Dados não enviados</td></tr>";
        return;
    }

    t.innerHTML = `
    <tr>
        <th>Município</th>
        <th>Estado</th>
        <th>Formador</th>
        <th>Data</th>
        <th>Total</th>
    </tr>`;

    lista.forEach(d=>{
        t.innerHTML += `
        <tr>
            <td>${d.municipio}</td>
            <td>${d.estado}</td>
            <td>${d.formador}</td>
            <td>${d.data}</td>
            <td>${d.total}</td>
        </tr>`;
    });
}

// MOSTRA TODOS AO INICIAR
render(dadosBase);


// ================= FILTROS =================
function filtrar(){

    dadosFiltrados = dadosBase.filter(d => {

        return (!estado.value || d.estado === estado.value)
        && (!municipio.value || d.municipio === municipio.value)
        && (!formador.value || d.formador === formador.value)
        && (!formadorLocal.value || d.formador_local === formadorLocal.value)
        && (d.pba >= (pba.value || 0))
        && (d.eja_alf >= (ejaalf.value || 0))
        && (d.eja_ai >= (ejaai.value || 0))
        && (d.total >= (total.value || 0));
    });

    render(dadosFiltrados);
}


// ================= MAPA SIMPLES =================
function criarMapa(){

    let estados = [...new Set(dadosBase.map(d=>d.estado))];

    let div = document.getElementById("mapaEstados");

    estados.forEach(est => {

        let btn = document.createElement("button");

        btn.innerText = est;
        btn.onclick = () => {

            document.getElementById("estado").value = est;
            document.getElementById("estadoSelecionado").innerText =
                "Estado selecionado: " + est;

            filtrar();
        };

        div.appendChild(btn);
    });
}

criarMapa();

function limpar(){
    location.reload();
}

</script>

</body>
</html>

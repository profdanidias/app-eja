<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard EJA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>
body {
    font-family: Arial;
    margin: 20px;
    background: #f5f7fa;
}

h1 {
    text-align: center;
}

/* FILTRO */
.filtro {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* CARDS */
.cards {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.card {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

/* MAPA */
#mapa {
    width: 100%;
    height: 500px;
    background: white;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* GRÁFICOS */
.graficos {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.grafico {
    background: white;
    padding: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>Dashboard - Pacto EJA</h1>

{% if meses %}

<!-- FILTRO -->
<div class="filtro">
    <label><b>Filtrar por Estado:</b></label>
    <select id="filtroEstado" multiple style="width:100%; padding:10px;"></select>
</div>

<!-- CARDS -->
<div class="cards">
    <div class="card">
        <h2 id="totalEstados"></h2>
        <p>Estados</p>
    </div>

    <div class="card">
        <h2 id="totalParticipantes"></h2>
        <p>Participantes</p>
    </div>

    <div class="card">
        <h2>{{ funcoes|length }}</h2>
        <p>Tipos de usuários</p>
    </div>
</div>

<!-- MAPA -->
<div id="mapa"></div>

<!-- GRÁFICOS -->
<div class="graficos">
    <div class="grafico">
        <h3>Participantes por Estado</h3>
        <canvas id="graficoEstado"></canvas>
    </div>

    <div class="grafico">
        <h3>Participantes por Mês</h3>
        <canvas id="graficoMes"></canvas>
    </div>
</div>

<script>

// ================= DADOS =================
const dadosEstadoOriginal = {{ dados_estado | tojson }};
const mesesOriginal = {{ meses | tojson }};
const funcoes = {{ funcoes | tojson }};

// ================= FILTRO =================
const select = document.getElementById("filtroEstado");

dadosEstadoOriginal.forEach(e => {
    let option = document.createElement("option");
    option.value = e[0];
    option.text = e[0];
    select.appendChild(option);
});

// ================= MAPA =================
google.charts.load('current', {
    'packages':['geochart'],
});

let mapa;

function desenharMapa(dadosFiltrados){

    const data = new google.visualization.DataTable();
    data.addColumn('string', 'Estado');
    data.addColumn('number', 'Participantes');

    dadosFiltrados.forEach(e => {
        data.addRow([ 'BR-' + e[0], e[1] ]);
    });

    const options = {
        region: 'BR',
        resolution: 'provinces',
        colorAxis: {colors: ['#d4e6f1', '#1f618d']},
        backgroundColor: '#ffffff',
        datalessRegionColor: '#eeeeee'
    };

    mapa = new google.visualization.GeoChart(document.getElementById('mapa'));
    mapa.draw(data, options);
}

// ================= GRÁFICOS =================
let graficoEstado, graficoMes;

function atualizarDashboard(){

    const selecionados = Array.from(select.selectedOptions).map(o => o.value);

    let dadosFiltrados = dadosEstadoOriginal;

    if (selecionados.length > 0){
        dadosFiltrados = dadosEstadoOriginal.filter(e => selecionados.includes(e[0]));
    }

    // CARDS
    document.getElementById("totalEstados").innerText = dadosFiltrados.length;

    const total = dadosFiltrados.reduce((acc,e)=>acc+e[1],0);
    document.getElementById("totalParticipantes").innerText = total;

    // MAPA
    desenharMapa(dadosFiltrados);

    // GRAFICO ESTADO
    if (graficoEstado) graficoEstado.destroy();

    graficoEstado = new Chart(document.getElementById("graficoEstado"), {
        type: "bar",
        data: {
            labels: dadosFiltrados.map(e => e[0]),
            datasets: [{
                label: "Participantes",
                data: dadosFiltrados.map(e => e[1]),
            }]
        }
    });

    // GRAFICO MES
    if (graficoMes) graficoMes.destroy();

    graficoMes = new Chart(document.getElementById("graficoMes"), {
        type: "line",
        data: {
            labels: ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set"],
            datasets: [{
                label: "Participantes",
                data: mesesOriginal,
            }]
        }
    });
}

// evento
select.addEventListener("change", atualizarDashboard);

// inicializa
google.charts.setOnLoadCallback(atualizarDashboard);

</script>

{% else %}
<h2 style="text-align:center;">Sem dados</h2>
{% endif %}

</body>
</html>

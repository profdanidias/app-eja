<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard EJA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f6f9; margin:20px; }
.card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; }
</style>
</head>

<body>

<h2>Painel de Monitoramento EJA</h2>

<!-- FILTRO -->
<select id="filtroEstado">
<option value="">Selecione um Estado</option>
</select>

<button onclick="exportar()">Exportar Excel</button>

<div id="aviso"></div>

<!-- MAPA -->
<div class="card">
<h3>Mapa do Brasil (clique no estado)</h3>
<img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Brazil_states_blank_map.svg"
width="500"
onclick="alert('Mapa clicável pode ser refinado depois')">
</div>

<div class="card">
<canvas id="graficoEstado"></canvas>
</div>

<div class="card">
<table border="1" width="100%" id="tabela">
<tr>
<th>Município</th>
<th>Estado</th>
<th>Formador</th>
<th>Total</th>
</tr>
</table>
</div>

<script>

const estados = {{ dados_estado | tojson }};
const municipios = {{ dados_municipio | tojson }};

// POPULAR SELECT
const select = document.getElementById("filtroEstado");
estados.forEach(e=>{
    select.innerHTML += `<option value="${e[0]}">${e[0]}</option>`;
});

// FILTRO
select.onchange = () => carregar(select.value);

function carregar(estado){

    let tabela = document.getElementById("tabela");
    tabela.innerHTML = `<tr><th>Município</th><th>Estado</th><th>Formador</th><th>Total</th></tr>`;

    let filtrados = municipios.filter(m => !estado || m[1] === estado);

    if(filtrados.length === 0){
        document.getElementById("aviso").innerHTML = "<b>Dados não enviados</b>";
    } else {
        document.getElementById("aviso").innerHTML = "";
    }

    filtrados.forEach(m=>{
        tabela.innerHTML += `<tr>
        <td>${m[0]}</td>
        <td>${m[1]}</td>
        <td>${m[2]}</td>
        <td>${m[3]}</td>
        </tr>`;
    });
}

// GRÁFICO
new Chart(document.getElementById("graficoEstado"), {
    type: "bar",
    data: {
        labels: estados.map(e=>e[0]),
        datasets:[{data: estados.map(e=>e[1])}]
    }
});

// EXPORTAR
function exportar(){
    window.location.href = "/exportar";
}

carregar("");

</script>

</body>
</html>
